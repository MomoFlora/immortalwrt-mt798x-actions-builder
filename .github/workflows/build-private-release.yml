# ===============================================================================
# Custom Build Configuration
# ------------------------------------------------------------------------------
# Project   : ImmortalWrt for MT798X
# Repository: https://github.com/MomoFlora/immortalwrt-mt798x-actions-builder
# Maintainer: Zhao Wenwen
#
# Description:
#   Customized build pipeline based on P3TERX Actions-OpenWrt,
#   tailored for Philips HY3000 platform with MT7981 SoC.
# ===============================================================================

name: 📀 本地编译

on:
# 远程触发按钮
  repository_dispatch:
    
# 手动触发
  workflow_dispatch:
    inputs:
      DEVICE:
        description: '🖥️ 选择构建设备'
        required: true
        default: 'Philips_HY3000'
        type: choice
        options:
          - 'Cetron_CT3003'
          - 'Cudy_TR3000-V1'
          - 'Cudy_TR3000-V1-256ROM'
          - 'CLX_S20P'
          - 'CLX_S20L'
          - 'Philips_HY3000'
          - 'JDCloud_RE-CP-03'
          - 'Netcore_N60-PRO'
          - 'Netcore_N60-PRO-512ROM'
          - 'Qihoo_360T7'
      HOST_NAME:
        description: '🏷️ 设置主机名称'
        required: true
        default: 'ZeroWrt'
        type: string          
      LAN_IP:
        description: '🌐 修改默认 LAN IP 地址（默认 LAN IP 为 10.0.0.1 ）'
        required: true
        default: '10.0.0.1'
        type: string
      ROOT_PASSWORD:
        description: '🔐 Root 密码（默认密码为 password ）'
        required: false
        default: 'password'
        type: string
      BUILD_FAST:
        description: '⚡ 启用 Toolchain Cache（使用缓存加速下一次构建）'
        required: true
        type: boolean
        default: false
      BUILD_UBOOT:
        description: '🧱 是否同时编译 U-Boot'
        required: true
        type: boolean
        default: false
        
# 定时触发编译
#  schedule:
#    - cron: '0 16 1 * *'

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  OPENWRT_FILE: ${{ github.event.inputs.DEVICE }}/files
  FEEDS_CONF: ${{ github.event.inputs.DEVICE }}/feeds.conf.default
  CONFIG_FILE: ${{ github.event.inputs.DEVICE }}/${{ github.event.inputs.DEVICE }}.config
  DIY_P1_SH: ${{ github.event.inputs.DEVICE }}/diy-part1.sh
  DIY_P2_SH: ${{ github.event.inputs.DEVICE }}/diy-part2.sh
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  Build_Firmware:
    runs-on: self-hosted
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
    - name: 检查项目分支
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 检查服务器性能
      run: |
        echo "════════════════════════════════════════════════════════"
        echo "🔧 系统信息"
        echo "════════════════════════════════════════════════════════"
        echo "📊 CPU:"
        echo "   $(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')"
        echo "   ⚡ 频率: $(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') MHz"
        echo "   🔢 核心数: $(grep processor /proc/cpuinfo | wc -l)"    
        echo ""
        echo "💾 内存:"
        free -h | awk '/^Mem:/ {print "   总计: " $2, "| 已用: " $3, "| 空闲: " $4}'
        free -h | awk '/^Swap:/ {print "   交换分区: " $2, "| 已用: " $3, "| 空闲: " $4}'    
        echo ""
        echo "💿 存储:"
        df -Th / /mnt 2>/dev/null | awk 'NR==1 {print "   " $0} NR>1 {print "   " $0}'    
        echo ""
        echo "🐧 系统:"
        lsb_release -a 2>/dev/null | awk '{print "   " $0}'
        echo ""
        echo "🔧 内核:"
        echo "   $(uname -a)"
        echo ""
        echo "🖥️ 编译设备: ${{ github.event.inputs.DEVICE }}"
        echo "════════════════════════════════════════════════════════"
  
    - name: 下载固件源码
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        
    - name: 加载 feeds.conf.default & DIY_P1_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 & 安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [[ -d "$OPENWRT_FILE" ]] && mv -f "$OPENWRT_FILE" openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 设置主机名 （路由器名称）
      run: |
        cd openwrt

        SET_HOST="${{ github.event.inputs.HOST_NAME }}"

        # 简单校验（只允许字母数字和-）
        if [[ "$SET_HOST" =~ ^[a-zA-Z0-9\-]+$ ]]; then

            echo ">>> 设置主机名: $SET_HOST"

            FILE="package/base-files/files/bin/config_generate"

            # 只替换 hostname 这一行（精准替换）
            sed -i -E "s/(set system\.\@system\[-1\]\.hostname=')[^']*'/\1$SET_HOST'/g" "$FILE"

            echo ">>> 主机名修改完成"

        else
            echo ">>> 主机名不合法，仅允许字母、数字、-，跳过"
        fi     
        
    - name: 设置 LAN IP 地址（路由器登录地址）
      run: |
        cd openwrt

        SET_IP="${{ github.event.inputs.LAN_IP }}"

        # 校验 IP
        if [[ "$SET_IP" =~ ^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$ ]]; then

            echo ">>> 设置 LAN IP: $SET_IP"

            # 1. 修改默认 LAN IP（核心）
            sed -i -E "s/(lan_ip=)192\.168\.[0-9]+\.[0-9]+/\1$SET_IP/g" \
                package/base-files/files/bin/config_generate

            # 2. 修改 LuCI 默认提示 IP（更精准定位文件）
            LUCI_FILE="feeds/luci/modules/luci-mod-system/htdocs/luci-static/resources/view/system/flash.js"
            if [ -f "$LUCI_FILE" ]; then
                sed -i -E "s/192\.168\.[0-9]+\.[0-9]+/$SET_IP/g" "$LUCI_FILE"
            fi

            echo ">>> LAN IP 已修改完成"

        else
            echo ">>> IP 不合法，跳过修改（保持默认 10.0.0.1）"
        fi

    - name: 设置路由器默认密码
      run: |
        cd openwrt

        ROOT_PWD="${{ github.event.inputs.ROOT_PASSWORD }}"

        if [ -n "$ROOT_PWD" ]; then

            echo ">>> 设置 Root 密码"

            PASSWORD_HASH=$(openssl passwd -6 "$ROOT_PWD")

            sed -i -E "s|^root:[^:]*:|root:${PASSWORD_HASH}:|" \
                package/base-files/files/etc/shadow

            echo ">>> Root 密码设置完成"

        else
            echo ">>> 未设置 Root 密码，保持默认"
        fi

    - name: 下载安装包
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 使用缓存加速构建
      if: github.event.inputs.BUILD_FAST == 'true'
      run: |
        TOOLCHAIN_URL=https://github.com/MomoFlora/immortalwrt-mt798x-actions-builder/releases/download/Toolchain_Cache
        curl -L ${TOOLCHAIN_URL}/toolchain_musl_aarch64_cortex-a53_gcc-13.tar.zst -o toolchain.tar.zst --progress-bar

        echo -e "\n==> 正在加载工具链..."

        tar -I "zstd" -xf toolchain.tar.zst

        echo "==> 正在清理临时文件..."
        rm -f toolchain.tar.zst

        echo "==> 正在准备构建环境..."
        mkdir bin

        find ./staging_dir/ -name '*' -exec touch {} \; >/dev/null 2>&1
        find ./tmp/ -name '*' -exec touch {} \; >/dev/null 2>&1

        echo "==> 工具链加载完成"
        
    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 查看磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 整理文件
      if: steps.compile.outputs.status == 'success'
      run: |
        mkdir -p rom info
        if [[ "${{ github.event.inputs.DEVICE }}" == Cetron_CT3003 ]]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-factory.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *squashfs-factory.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "Cudy_TR3000-V1" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "Cudy_TR3000-V1-256ROM" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "CLX_S20P" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "CLX_S20L" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "Philips_HY3000" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "JDCloud_RE-CP-03" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "Netcore_N60-PRO" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "Netcore_N60-PRO-512ROM" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        elif [ "${{ github.event.inputs.DEVICE }}" = "Qihoo_360T7" ]; then
          cp -a openwrt/bin/targets/mediatek/filogic/*squashfs-sysupgrade.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*initramfs-kernel.bin rom/
          cp -a openwrt/bin/targets/mediatek/filogic/*.manifest info/manifest.txt
          cp -a openwrt/bin/targets/mediatek/filogic/config.buildinfo info/config.buildinfo
          cd rom && sha256sum *squashfs-sysupgrade.bin *initramfs-kernel.bin > ../info/sha256sums.txt
        fi
        cd ..
        tar zcf rom/buildinfo_${{ github.event.inputs.device }}.tar.gz info
        echo "BUILD_DATE=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

    - name: 将固件上传到 Artifact
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ImmortalWrt-mt798x-${{ github.event.inputs.DEVICE }}
        path: rom/*

    - name: 上传固件到发布版本
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ github.event.inputs.DEVICE }}
        allowUpdates: true
        tag: ${{ github.event.inputs.DEVICE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: rom/*
        body: |
          # 🚀 ZeroWrt Mediatek 固件发布

          > 基于开源项目构建，专为高性能与稳定性优化

          ## 📦 构建信息

          - 🖥️ **目标设备**：`${{ github.event.inputs.DEVICE }}`
          - 📅 **构建时间**：`${{ env.BUILD_DATE }}`
          - 🌿 **源码分支**：`${{ env.REPO_BRANCH }}`
          - 🧠 **内核版本**：`Linux 6.6.95`

          ## ⚙️ 默认配置

          - 🌐 **管理地址**：`${{ github.event.inputs.LAN_IP }}`
          - 🏷️ **主机名称**：`${{ github.event.inputs.HOST_NAME }}`

          ### 📶 无线网络

          - 📡 **WiFi 名称**：
            - `ZeroWrt-2.4G`
            - `ZeroWrt-5G`
          - 🔑 **WiFi 密码**：`1234567890`

          ## ⚠️ 注意事项

          - 因精力有限不提供任何技术支持和教程等相关问题解答，不保证完全无 BUG！  
          - 本人不对任何人因使用本固件所遭受的任何理论或实际的损失承担责任！  
          - 本固件禁止用于任何商业用途，请务必严格遵守国家互联网使用相关法律规定！  

          > 💡 **提示**：如需个性化配置（WiFi / IP / 插件），建议自行编译以获得最佳体验

  Build_Uboot:
    needs: [Build]
    runs-on: ubuntu-24.04

    env:
      REPO_URL: https://github.com/Yuzhii0718/bl-mt798x-dhcpd
      REPO_BRANCH: master
      FIRMWARE_RELEASE: true
      TZ: Asia/Shanghai

    steps:
    - name: 检查项目分支
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        
    - name: 下载 Uboot 源码
      working-directory: /builder
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH uboot

    - name: 开始编译 Uboot
      id: compile
      run: |
        cd uboot
        sed -i 's/^AUTHOR="Yuzhii"/AUTHOR="MomoFlora"/' build.sh
        if [[ "${{ github.event.inputs.DEVICE }}" == Cetron_CT3003 ]]; then
          SOC=mt7981 BOARD=cetron_ct3003 VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "Cudy_TR3000-V1" ]; then
          SOC=mt7981 BOARD=cudy-tr3000-v1 VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "Cudy_TR3000-V1-256MB" ]; then
          cp -f "$GITHUB_WORKSPACE/Cudy_TR3000-V1(256ROM)/atf_cudy_tr3000-v1-256mb" atf-20250711/configs/mt7981_cudy-tr3000-v1-256mb_defconfig
          cp -f "$GITHUB_WORKSPACE/Cudy_TR3000-V1(256ROM)/mt7981-cudy-tr3000-v1-256mb.dts" uboot-mtk-20250711/arch/arm/dts/mt7981-cudy-tr3000-v1-256mb.dts
          cp -f "$GITHUB_WORKSPACE/Cudy_TR3000-V1(256ROM)/uboot-mtk_cudy_tr3000-v1-256mb" uboot-mtk-20250711/configs/mt7981_cudy-tr3000-v1-256mb_defconfig
          SOC=mt7981 BOARD=cudy-tr3000-v1-256mb VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "CLX_S20L" ]; then
          cp -f $GITHUB_WORKSPACE/CLX_S20L/atf_clx_s20l atf-20250711/configs/mt7986_clx_s20l_defconfig
          cp -f $GITHUB_WORKSPACE/CLX_S20L/mt7986a-clx_s20l.dts uboot-mtk-20250711/arch/arm/dts/mt7986a-clx_s20l.dts
          cp -f $GITHUB_WORKSPACE/CLX_S20L/uboot-mtk_clx_s20l uboot-mtk-20250711/configs/mt7986_clx_s20l_defconfig
          SOC=mt7986 BOARD=clx_s20l VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "CLX_S20P" ]; then    
          SOC=mt7986 BOARD=clx_s20p VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "Philips_HY3000" ]; then  
          SOC=mt7981 BOARD=philips_hy3000 VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "JDCloud_RE-CP-03" ]; then
          SOC=mt7986 BOARD=jdcloud_re-cp-03 VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "Netcore_N60-PRO" ]; then
          SOC=mt7986 BOARD=netcore_n60-pro VERSION=2025 ./build.sh
        elif [ "${{ github.event.inputs.DEVICE }}" = "Netcore_N60-PRO-512ROM" ]; then
          sed -i 's/117248k(ubi)/470m(ubi)/' uboot-mtk-20250711/configs/mt7986_netcore_n60-pro_defconfig
          SOC=mt7986 BOARD=netcore_n60-pro VERSION=2025 ./build.sh
          for f in output/*mt7986_netcore_n60-pro_*; do
            mv "$f" "$(echo "$f" | sed 's/-pro_/-pro-512rom_/')"
          done
        elif [ "${{ github.event.inputs.DEVICE }}" = "Qihoo_360T7" ]; then
          SOC=mt7981 BOARD=360t7 VERSION=2025 ./build.sh
        fi
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 整理文件
      if: steps.compile.outputs.status == 'success'
      run: |
        cd uboot/output
        echo "原始文件："
        ls -lh

        # 去掉文件名中的 md5 值
        for file in *md5-*; do
          new_name=$(echo "$file" | sed -E 's/_md5-[a-f0-9]+//')
          mv "$file" "$new_name"
        done

        echo "处理后文件："
        ls -lh
        
    - name: 将固件上传到 Artifact
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ImmortalWrt-mt798x-${{ github.event.inputs.DEVICE }}
        path: uboot/output/*

    - name: 上传固件到发布版本
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ github.event.inputs.DEVICE }}
        allowUpdates: true
        tag: ${{ github.event.inputs.DEVICE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: uboot/output/*      
