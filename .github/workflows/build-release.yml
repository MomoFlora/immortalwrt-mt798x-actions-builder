# ===============================================================================
# Custom Build Configuration
# ------------------------------------------------------------------------------
# Project   : ImmortalWrt for MT7981 (Philips HY3000)
# Repository: https://github.com/MomoFlora/immortalwrt-mt7981-philips-hy3000
# Maintainer: Zhao Wenwen
#
# Description:
#   Customized build pipeline based on P3TERX Actions-OpenWrt,
#   tailored for Philips HY3000 platform with MT7981 SoC.
# ===============================================================================

name: 🧩 固件编译

on:
# 远程触发按钮
  repository_dispatch:
    
# 手动触发
  workflow_dispatch:
    inputs:
      DEVICE:
        description: '🖥️ 选择构建设备'
        required: true
        default: 'Philips_HY3000'
        type: choice
        options:
          - 'Cetron_CT3003'
          - 'Cudy_TR3000-V1'
          - 'Cudy_TR3000-V1-256MB'
          - 'CLX_S20P'
          - 'Philips_HY3000'
          - 'JDCloud_RE-CP-03'
          - 'Netcore_N60-PRO'
          - 'Qihoo_360T7'
      HOST_NAME:
        description: '🏷️ 主机名称 （Host Name）'
        required: true
        default: 'ZeroWrt'
        type: string          
      LAN_IP:
        description: '🌐 LAN IP 地址 （LAN IPv4 Address）'
        required: true
        default: '10.0.0.1'
        type: string
      ROOT_PASSWORD:
        description: '🔐 Root 密码（Root password, optional）'
        required: false
        default: ''
        type: string

# 定时触发编译
  schedule:
    - cron: '0 16 1 * *'

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-24.10-6.6
  OPENWRT_FILE: ${{ github.event.inputs.DEVICE }}/files
  FEEDS_CONF: ${{ github.event.inputs.DEVICE }}/feeds.conf.default
  CONFIG_FILE: ${{ github.event.inputs.DEVICE }}/${{ github.event.inputs.DEVICE }}.config
  DIY_P1_SH: ${{ github.event.inputs.DEVICE }}/diy-part1.sh
  DIY_P2_SH: ${{ github.event.inputs.DEVICE }}/diy-part2.sh
  CACHE_TOOLCHAIN: true
  FIRMWARE_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  Build:
    runs-on: ubuntu-24.04
    if: ${{ github.event.repository.owner.id == github.event.sender.id }}

    steps:
    - name: 检查项目分支
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: 检查服务器性能
      run: |
        echo "════════════════════════════════════════════════════════"
        echo "🔧 系统信息"
        echo "════════════════════════════════════════════════════════"
        echo "📊 CPU:"
        echo "   $(grep 'model name' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}')"
        echo "   ⚡ 频率: $(grep 'cpu MHz' /proc/cpuinfo | head -1 | awk -F ': ' '{print $2}') MHz"
        echo "   🔢 核心数: $(grep processor /proc/cpuinfo | wc -l)"    
        echo ""
        echo "💾 内存:"
        free -h | awk '/^Mem:/ {print "   总计: " $2, "| 已用: " $3, "| 空闲: " $4}'
        free -h | awk '/^Swap:/ {print "   交换分区: " $2, "| 已用: " $3, "| 空闲: " $4}'    
        echo ""
        echo "💿 存储:"
        df -Th / /mnt 2>/dev/null | awk 'NR==1 {print "   " $0} NR>1 {print "   " $0}'    
        echo ""
        echo "🐧 系统:"
        lsb_release -a 2>/dev/null | awk '{print "   " $0}'
        echo ""
        echo "🔧 内核:"
        echo "   $(uname -a)"
        echo ""
        echo "🖥️ 编译设备: ${{ github.event.inputs.DEVICE }}"
        echo "════════════════════════════════════════════════════════"
          
    - name: 初始化构建环境
      id: init
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        docker rmi -f $(docker images -q) 2>/dev/null || true
        [[ -n "${AGENT_TOOLSDIRECTORY}" ]] && sudo rm -rf "${AGENT_TOOLSDIRECTORY}"
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android 2>/dev/null
        sudo swapoff -a
        sudo rm -f /swapfile /mnt/swapfile
        sudo -E apt-get -y update
        sudo -E apt-get -y purge azure-cli ghc* zulu* llvm* firefox google* dotnet* powershell openjdk* mongodb* moby* || true
        sudo -E apt-get -y install $(curl -fsSL https://ophub.org/ubuntu2404-make-openwrt-depends)
        sudo -E systemctl daemon-reload
        sudo -E apt-get -y autoremove --purge
        sudo -E apt-get clean
        sudo sed -i '/NVM_DIR/d;/skel/d' /root/{.bashrc,.profile}
        sudo rm -rf ~/{.cargo,.dotnet,.rustup}
        sudo -E timedatectl set-timezone "${TZ:-Etc/UTC}"
        sudo -E ntpdate ntp.ubuntu.com 0.pool.ntp.org || true
        sudo -E timedatectl set-ntp true
        date -u
        timedatectl status || true

    - name: 创建虚拟磁盘以扩展存储
      run: |
        mnt_size=$(expr $(df -h /mnt | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 1)
        root_size=$(expr $(df -h / | tail -1 | awk '{print $4}' | sed 's/[[:alpha:]]//g' | sed 's/\..*//') - 4)
        sudo truncate -s "${mnt_size}"G /mnt/mnt.img
        sudo truncate -s "${root_size}"G /root.img
        sudo losetup /dev/loop6 /mnt/mnt.img
        sudo losetup /dev/loop7 /root.img
        sudo pvcreate /dev/loop6
        sudo pvcreate /dev/loop7
        sudo vgcreate github /dev/loop6 /dev/loop7
        sudo lvcreate -n runner -l 100%FREE github
        sudo mkfs.xfs -f -i sparse=0 -b size=4096 /dev/github/runner
        sudo mkdir -p /builder
        sudo mount /dev/github/runner /builder
        sudo chown -R runner:runner /builder
  
    - name: 下载固件源码
      working-directory: /builder
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /builder/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 缓存工具链
      if: env.CACHE_TOOLCHAIN == 'true'
      uses: HiGarfield/cachewrtbuild@main
      with:
        ccache: false
        mixkey: immortalwrt-mt798x-${{ github.event.inputs.DEVICE }}
        prefix: openwrt
        
    - name: 加载 feeds.conf.default & DIY_P1_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 & 安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载自定义配置
      run: |
        [[ -d "$OPENWRT_FILE ]] && mv -f $OPENWRT_FILE openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 设置主机名 （路由器名称）
      run: |
        cd openwrt

        SET_HOST="${{ github.event.inputs.HOST_NAME }}"

        # 简单校验（只允许字母数字和-）
        if [[ "$SET_HOST" =~ ^[a-zA-Z0-9\-]+$ ]]; then

            echo ">>> 设置主机名: $SET_HOST"

            FILE="package/base-files/files/bin/config_generate"

            # 只替换 hostname 这一行（精准替换）
            sed -i -E "s/(set system\.\@system\[-1\]\.hostname=')[^']*'/\1$SET_HOST'/g" "$FILE"

            echo ">>> 主机名修改完成"

        else
            echo ">>> 主机名不合法，仅允许字母、数字、-，跳过"
        fi     
        
    - name: 设置 LAN IP 地址（路由器登录地址）
      run: |
        cd openwrt

        SET_IP="${{ github.event.inputs.LAN_IP }}"

        # 校验 IP
        if [[ "$SET_IP" =~ ^(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)(\.(25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)){3}$ ]]; then

            echo ">>> 设置 LAN IP: $SET_IP"

            # 1. 修改默认 LAN IP（核心）
            sed -i -E "s/(lan_ip=)192\.168\.[0-9]+\.[0-9]+/\1$SET_IP/g" \
                package/base-files/files/bin/config_generate

            # 2. 修改 LuCI 默认提示 IP（更精准定位文件）
            LUCI_FILE="feeds/luci/modules/luci-mod-system/htdocs/luci-static/resources/view/system/flash.js"
            if [ -f "$LUCI_FILE" ]; then
                sed -i -E "s/192\.168\.[0-9]+\.[0-9]+/$SET_IP/g" "$LUCI_FILE"
            fi

            echo ">>> LAN IP 已修改完成"

        else
            echo ">>> IP 不合法，跳过修改（保持默认 10.0.0.1）"
        fi

    - name: 设置路由器默认密码
      run: |
        cd openwrt

        ROOT_PWD="${{ github.event.inputs.ROOT_PASSWORD }}"

        if [ -n "$ROOT_PWD" ]; then

            echo ">>> 设置 Root 密码"

            PASSWORD_HASH=$(openssl passwd -6 "$ROOT_PWD")

            sed -i -E "s|^root:[^:]*:|root:${PASSWORD_HASH}:|" \
                package/base-files/files/etc/shadow

            echo ">>> Root 密码设置完成"

        else
            echo ">>> 未设置 Root 密码，保持默认"
        fi

    - name: 下载安装包
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 || make -j1 V=s
        echo "status=success" >> $GITHUB_OUTPUT

    - name: 查看磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 整理文件
      if: steps.compile.outputs.status == 'success'
      run: |
        cd openwrt/bin/targets/*/*
        cat sha256sums
        tar -zcf Packages.tar.gz packages
        rm -rf packages feeds.buildinfo version.buildinfo

    - name: 将固件上传到 Artifact
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ImmortalWrt-mt798x-${{ github.event.inputs.DEVICE }}
        path: openwrt/bin/targets/*/*

    - name: 上传固件到发布版本
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: ${{ github.event.inputs.DEVICE }}
        allowUpdates: true
        tag: ${{ github.event.inputs.DEVICE }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: openwrt/bin/targets/*/*/*
